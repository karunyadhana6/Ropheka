<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✍️ Spelling Game - Fun English Learning</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Background shapes -->
    <div class="bg-shapes">
        <div class="floating-shape shape-1">📚</div>
        <div class="floating-shape shape-2">✏️</div>
        <div class="floating-shape shape-3">🎨</div>
        <div class="floating-shape shape-4">🌈</div>
        <div class="floating-shape shape-5">⭐</div>
    </div>
    <div class="bg-shapes" id="dynamicBg"></div>

    <div class="app-container">
        <a href="index.html" class="back-btn">⬅️ Back to Home</a>
        
        <!-- Header -->
        <header class="header">
            <h1 class="app-title">✍️ Spell the Word!</h1>
            <p class="subtitle">Can you spell it correctly? 🌟</p>
            
            <div class="score-bar">
                <div class="score-item">
                    <span class="score-icon">⭐</span>
                    <span class="score-text" id="totalStars">0 Stars</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🏆</span>
                    <span class="score-text" id="level">Level 1</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🔥</span>
                    <span class="score-text" id="streak">0 Streak</span>
                </div>
            </div>
        </header>

        <!-- Spelling Section -->
        <section class="game-section">
            <h2 class="section-title">✍️ Spell the Word!</h2>
            
            <!-- Difficulty selector -->
            <div class="difficulty-selector">
                <button class="difficulty-btn active" onclick="setSpellingDifficulty('easy')" data-difficulty="easy">🌟 Easy</button>
                <button class="difficulty-btn" onclick="setSpellingDifficulty('medium')" data-difficulty="medium">⭐ Medium</button>
                <button class="difficulty-btn" onclick="setSpellingDifficulty('hard')" data-difficulty="hard">🔥 Hard</button>
                <button class="difficulty-btn" onclick="setSpellingDifficulty('advanced')" data-difficulty="advanced">🏆 Advanced</button>
            </div>
            
            <div class="spelling-game">
                <div class="spelling-image" id="spellingImage">🐱</div>
                <div class="spelling-hint" id="spellingHint">Can you spell this animal?</div>
                
                <div class="spelling-slots" id="spellingSlots">
                    <!-- Slots generated by JavaScript -->
                </div>
                
                <div class="letter-choices" id="letterChoices">
                    <!-- Letter buttons generated by JavaScript -->
                </div>
                
                <div class="spelling-result" id="spellingResult"></div>
                
                <div class="spelling-controls">
                    <button class="control-btn clear-btn" onclick="clearSpelling()">🔄 Clear</button>
                    <button class="control-btn speak-btn" onclick="speakCurrentWord()">🔊 Hear Word</button>
                </div>
                
                <button class="next-round-btn" id="nextSpellingBtn" onclick="startNewSpellingRound()" style="display: none;">
                    ▶️ Next Word!
                </button>
            </div>
        </section>
    </div>

    <!-- Celebration container -->
    <div class="celebration" id="celebration"></div>

    <!-- Sound toggle -->
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        // ==================== SPELLING GAME STATE ====================
        let spellingDifficulty = 'easy';
        let spellingState = {
            currentWord: null,
            currentIndex: 0,
            letters: []
        };

        // Word pools by difficulty
        const spellingWords = spellingWordsEasy;
        const mediumSpellingWords = spellingWordsMedium;
        const hardSpellingWords = spellingWordsHard;
        const advancedSpellingWords = spellingWordsAdvanced;

        function setSpellingDifficulty(difficulty) {
            spellingDifficulty = difficulty;
            
            // Update button states
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.difficulty === difficulty);
            });
            
            // Start new round with new difficulty
            startNewSpellingRound();
            playSound('pop');
        }

        function getSpellingWordsByDifficulty() {
            switch(spellingDifficulty) {
                case 'easy':
                    return spellingWords.filter(w => w.word.length <= 4);
                case 'medium':
                    return mediumSpellingWords;
                case 'hard':
                    return hardSpellingWords;
                case 'advanced':
                    return advancedSpellingWords;
                default:
                    return spellingWords;
            }
        }

        function startNewSpellingRound() {
            // Pick random word based on difficulty
            const wordPool = getSpellingWordsByDifficulty();
            spellingState.currentWord = wordPool[Math.floor(Math.random() * wordPool.length)];
            spellingState.currentIndex = 0;
            spellingState.letters = [];
            
            document.getElementById('spellingImage').textContent = spellingState.currentWord.emoji;
            document.getElementById('spellingHint').textContent = spellingState.currentWord.hint;
            document.getElementById('spellingResult').textContent = '';
            document.getElementById('nextSpellingBtn').style.display = 'none';
            
            // Create slots
            const slotsContainer = document.getElementById('spellingSlots');
            slotsContainer.innerHTML = '';
            for (let i = 0; i < spellingState.currentWord.word.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'letter-slot';
                slot.id = `slot-${i}`;
                slotsContainer.appendChild(slot);
            }
            
            // Create letter choices (word letters + random extras)
            const wordLetters = spellingState.currentWord.word.split('');
            const extraCount = spellingDifficulty === 'advanced' ? 8 : 
                              spellingDifficulty === 'hard' ? 6 : 4;
            const extraLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')
                .filter(l => !wordLetters.includes(l))
                .sort(() => Math.random() - 0.5)
                .slice(0, extraCount);
            
            const allLetters = [...wordLetters, ...extraLetters].sort(() => Math.random() - 0.5);
            
            const choicesContainer = document.getElementById('letterChoices');
            choicesContainer.innerHTML = '';
            allLetters.forEach((letter, index) => {
                const btn = document.createElement('button');
                btn.className = 'letter-choice';
                btn.textContent = letter;
                btn.id = `choice-${index}`;
                btn.onclick = () => selectSpellingLetter(letter, btn);
                choicesContainer.appendChild(btn);
            });
        }

        function selectSpellingLetter(letter, btn) {
            if (spellingState.currentIndex >= spellingState.currentWord.word.length) return;
            
            const expectedLetter = spellingState.currentWord.word[spellingState.currentIndex];
            const slot = document.getElementById(`slot-${spellingState.currentIndex}`);
            
            slot.textContent = letter;
            slot.classList.add('filled');
            btn.disabled = true;
            spellingState.letters.push({ letter, btnId: btn.id });
            
            if (letter === expectedLetter) {
                slot.classList.add('correct');
                playSound('pop');
            } else {
                slot.classList.add('wrong');
                playSound('wrong');
            }
            
            spellingState.currentIndex++;
            
            // Check if word complete
            if (spellingState.currentIndex === spellingState.currentWord.word.length) {
                checkSpelling();
            }
        }

        function checkSpelling() {
            const spelled = spellingState.letters.map(l => l.letter).join('');
            
            if (spelled === spellingState.currentWord.word) {
                document.getElementById('spellingResult').textContent = `🎉 ${getAgeAppropriateEncouragement()} You spelled it correctly! 🌟`;
                playSound('success');
                addStar('spelling');
                addStar('spelling');
                addStreak();
                celebrate();
                speak(`${getAgeAppropriateEncouragement()} You spelled ${spellingState.currentWord.word}!`);
            } else {
                document.getElementById('spellingResult').textContent = `❌ The word was "${spellingState.currentWord.word}". Try again! 💪`;
                playSound('wrong');
                resetStreak();
            }
            
            document.getElementById('nextSpellingBtn').style.display = 'block';
        }

        function clearSpelling() {
            spellingState.letters.forEach(item => {
                const btn = document.getElementById(item.btnId);
                if (btn) btn.disabled = false;
            });
            
            spellingState.letters = [];
            spellingState.currentIndex = 0;
            
            document.querySelectorAll('.letter-slot').forEach(slot => {
                slot.textContent = '';
                slot.classList.remove('filled', 'correct', 'wrong');
            });
            
            document.getElementById('spellingResult').textContent = '';
            playSound('click');
        }

        function speakCurrentWord() {
            if (spellingState.currentWord) {
                speak(spellingState.currentWord.word);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', startNewSpellingRound);
    </script>
</body>
</html>
