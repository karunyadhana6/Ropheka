<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 Story Time - Fun English Learning</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Background shapes -->
    <div class="bg-shapes">
        <div class="floating-shape shape-1">📚</div>
        <div class="floating-shape shape-2">✏️</div>
        <div class="floating-shape shape-3">🎨</div>
        <div class="floating-shape shape-4">🌈</div>
        <div class="floating-shape shape-5">⭐</div>
    </div>
    <div class="bg-shapes" id="dynamicBg"></div>

    <div class="app-container">
        <a href="index.html" class="back-btn">⬅️ Back to Home</a>
        
        <!-- Header -->
        <header class="header">
            <h1 class="app-title">📖 Story Time!</h1>
            <p class="subtitle">Read fun stories and learn new words! 🌟</p>
            
            <div class="score-bar">
                <div class="score-item">
                    <span class="score-icon">⭐</span>
                    <span class="score-text" id="totalStars">0 Stars</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🏆</span>
                    <span class="score-text" id="level">Level 1</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🔥</span>
                    <span class="score-text" id="streak">0 Streak</span>
                </div>
            </div>
        </header>

        <!-- Story Section -->
        <section class="game-section">
            <h2 class="section-title">📖 Story Time!</h2>
            
            <!-- Story Selection -->
            <div class="story-selection">
                <div class="story-list" id="storyList">
                    <!-- Generated by JavaScript -->
                </div>
            </div>
            
            <div class="story-game">
                <div class="story-book" id="storyBook">
                    <div class="story-title" id="storyTitle">The Little Star ⭐</div>
                    <div class="story-illustration" id="storyIllustration">⭐</div>
                    <div class="story-text" id="storyText">
                        Once upon a time, there was a little <span class="highlight" onclick="speakWord('star')">star</span> in the sky.
                    </div>
                </div>
                
                <div class="story-navigation">
                    <button class="story-nav-btn" id="prevPageBtn" onclick="previousPage()" disabled>⬅️ Back</button>
                    <button class="story-nav-btn read-btn" id="readAloudBtn" onclick="readCurrentPage()">🔊 Read Aloud</button>
                    <button class="story-nav-btn" id="nextPageBtn" onclick="nextPage()">Next ➡️</button>
                </div>
                
                <div class="story-progress" id="storyProgress">
                    <!-- Dots added by JavaScript -->
                </div>
                
                <div class="story-controls">
                    <button class="control-btn" onclick="changeStory(-1)">📕 Previous Story</button>
                    <button class="control-btn" onclick="changeStory(1)">📗 Next Story</button>
                </div>
            </div>
        </section>
    </div>

    <!-- Celebration container -->
    <div class="celebration" id="celebration"></div>

    <!-- Sound toggle -->
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        // ==================== STORY GAME STATE ====================
        let currentStoryIndex = 0;
        let currentPageIndex = 0;

        function initStory() {
            generateStoryList();
            loadStory();
        }

        function generateStoryList() {
            const list = document.getElementById('storyList');
            list.innerHTML = '';
            
            stories.forEach((story, index) => {
                const btn = document.createElement('button');
                btn.className = 'story-select-btn' + (index === currentStoryIndex ? ' active' : '');
                btn.innerHTML = `<span class="story-thumb">${story.pages[0].illustration}</span> ${story.title}`;
                btn.onclick = () => selectStory(index);
                list.appendChild(btn);
            });
        }

        function selectStory(index) {
            currentStoryIndex = index;
            currentPageIndex = 0;
            
            // Update active button
            document.querySelectorAll('.story-select-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            
            loadStory();
            playSound('pop');
        }

        function loadStory() {
            const story = stories[currentStoryIndex];
            
            document.getElementById('storyTitle').textContent = story.title;
            
            // Generate progress dots
            const progressContainer = document.getElementById('storyProgress');
            progressContainer.innerHTML = '';
            
            story.pages.forEach((_, index) => {
                const dot = document.createElement('span');
                dot.className = 'progress-dot' + (index === currentPageIndex ? ' active' : '');
                dot.onclick = () => goToPage(index);
                progressContainer.appendChild(dot);
            });
            
            loadPage();
        }

        function loadPage() {
            const story = stories[currentStoryIndex];
            const page = story.pages[currentPageIndex];
            
            // Animate illustration
            const illustration = document.getElementById('storyIllustration');
            illustration.style.animation = 'none';
            illustration.offsetHeight; // Trigger reflow
            illustration.style.animation = 'illustrationBounce 0.5s ease';
            illustration.textContent = page.illustration;
            
            // Load text
            document.getElementById('storyText').innerHTML = page.text;
            
            // Update navigation buttons
            document.getElementById('prevPageBtn').disabled = currentPageIndex === 0;
            document.getElementById('nextPageBtn').textContent = 
                currentPageIndex === story.pages.length - 1 ? '🎉 The End!' : 'Next ➡️';
            
            // Update progress dots
            document.querySelectorAll('.progress-dot').forEach((dot, index) => {
                dot.classList.toggle('active', index === currentPageIndex);
                dot.classList.toggle('read', index < currentPageIndex);
            });
        }

        function goToPage(index) {
            currentPageIndex = index;
            loadPage();
            playSound('pop');
        }

        function previousPage() {
            if (currentPageIndex > 0) {
                currentPageIndex--;
                loadPage();
                playSound('pop');
            }
        }

        function nextPage() {
            const story = stories[currentStoryIndex];
            
            if (currentPageIndex < story.pages.length - 1) {
                currentPageIndex++;
                loadPage();
                playSound('pop');
            } else {
                // Story complete!
                completeStory();
            }
        }

        function completeStory() {
            addStar('sentences');
            addStar('sentences');
            celebrate();
            speak(`${getAgeAppropriateEncouragement()} You finished the story!`);
            
            // Show completion message
            const result = document.createElement('div');
            result.className = 'story-complete';
            result.innerHTML = `
                <h3>🎉 Great Job! 🎉</h3>
                <p>You finished "${stories[currentStoryIndex].title}"!</p>
                <button class="control-btn" onclick="this.parentElement.remove(); changeStory(1);">
                    📗 Read Next Story
                </button>
            `;
            document.getElementById('storyBook').appendChild(result);
        }

        function readCurrentPage() {
            const story = stories[currentStoryIndex];
            const page = story.pages[currentPageIndex];
            
            // Extract plain text from HTML
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = page.text;
            const plainText = tempDiv.textContent || tempDiv.innerText;
            
            speak(plainText);
        }

        function changeStory(direction) {
            currentStoryIndex = (currentStoryIndex + direction + stories.length) % stories.length;
            currentPageIndex = 0;
            
            // Update story list
            document.querySelectorAll('.story-select-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === currentStoryIndex);
            });
            
            loadStory();
            playSound('pop');
        }

        function speakWord(word) {
            speak(word);
            playSound('click');
            
            // Highlight effect
            event.target.style.transform = 'scale(1.2)';
            event.target.style.color = '#f97316';
            setTimeout(() => {
                event.target.style.transform = '';
                event.target.style.color = '';
            }, 300);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', initStory);
    </script>

    <style>
        /* Additional styles specific to story page */
        @keyframes illustrationBounce {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        .story-selection {
            margin-bottom: 30px;
        }
        
        .story-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .story-select-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.8);
            border: 3px solid #e5e7eb;
            border-radius: 15px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .story-select-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .story-select-btn.active {
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: white;
            border-color: #f97316;
        }
        
        .story-thumb {
            font-size: 24px;
        }
        
        .story-complete {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #1a1a2e;
            padding: 30px 50px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            z-index: 100;
            animation: bounceIn 0.5s ease;
        }
        
        @keyframes bounceIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        .progress-dot {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #e5e7eb;
            margin: 0 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .progress-dot:hover {
            transform: scale(1.2);
        }
        
        .progress-dot.active {
            background: linear-gradient(135deg, #f97316, #ec4899);
            transform: scale(1.3);
        }
        
        .progress-dot.read {
            background: #22c55e;
        }
        
        .story-book {
            position: relative;
        }
    </style>
</body>
</html>
