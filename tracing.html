<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✏️ Trace Letters - Fun English Learning</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background shapes -->
    <div class="bg-shapes">
        <div class="floating-shape shape-1">📚</div>
        <div class="floating-shape shape-2">✏️</div>
        <div class="floating-shape shape-3">🎨</div>
        <div class="floating-shape shape-4">🌈</div>
        <div class="floating-shape shape-5">⭐</div>
    </div>
    <div class="bg-shapes" id="dynamicBg"></div>

    <div class="app-container">
        <a href="index.html" class="back-btn">⬅️ Back to Home</a>
        
        <!-- Header -->
        <header class="header">
            <h1 class="app-title">✏️ Trace the Letters!</h1>
            <p class="subtitle">Practice writing letters! 🌟</p>
            
            <div class="score-bar">
                <div class="score-item">
                    <span class="score-icon">⭐</span>
                    <span class="score-text" id="totalStars">0 Stars</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🏆</span>
                    <span class="score-text" id="level">Level 1</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🔥</span>
                    <span class="score-text" id="streak">0 Streak</span>
                </div>
            </div>
        </header>

        <!-- Tracing Section -->
        <section class="game-section">
            <h2 class="section-title">✏️ Trace the Letters!</h2>
            
            <div class="tracing-game">
                <div class="trace-letter-display" id="traceLetter">A</div>
                <div class="trace-word-hint" id="traceWordHint">🍎 Apple</div>
                
                <div class="tracing-canvas-container">
                    <canvas id="tracingCanvas" width="400" height="280"></canvas>
                    <div class="guide-letter" id="guideLetter">A</div>
                </div>
                
                <div class="color-picker">
                    <span style="color: #666; font-size: 18px;">Pick a color:</span>
                    <button class="color-btn active" style="background: #6b4ce6;" onclick="setDrawColor('#6b4ce6', this)"></button>
                    <button class="color-btn" style="background: #ef4444;" onclick="setDrawColor('#ef4444', this)"></button>
                    <button class="color-btn" style="background: #22c55e;" onclick="setDrawColor('#22c55e', this)"></button>
                    <button class="color-btn" style="background: #3b82f6;" onclick="setDrawColor('#3b82f6', this)"></button>
                    <button class="color-btn" style="background: #f59e0b;" onclick="setDrawColor('#f59e0b', this)"></button>
                    <button class="color-btn" style="background: #ec4899;" onclick="setDrawColor('#ec4899', this)"></button>
                </div>
                
                <div class="brush-size">
                    <span style="color: #666; font-size: 18px;">Brush size:</span>
                    <button class="size-btn" onclick="setBrushSize(4)">Small</button>
                    <button class="size-btn active" onclick="setBrushSize(8)">Medium</button>
                    <button class="size-btn" onclick="setBrushSize(16)">Large</button>
                </div>
                
                <div class="tracing-controls">
                    <button class="control-btn clear-btn" onclick="clearTracing()">🗑️ Clear</button>
                    <button class="control-btn speak-btn" onclick="speakTraceLetter()">🔊 Hear Letter</button>
                    <button class="control-btn" onclick="previousTraceLetter()">⬅️ Previous</button>
                    <button class="control-btn" onclick="nextTraceLetter()">Next ➡️</button>
                </div>
                
                <div class="letter-navigation">
                    <div class="letter-grid" id="letterGrid">
                        <!-- Generated by JavaScript -->
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Celebration container -->
    <div class="celebration" id="celebration"></div>

    <!-- Sound toggle -->
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="sidebar.js"></script>
    <script>
        // ==================== TRACING GAME STATE ====================
        let traceLetterIndex = 0;
        let drawColor = '#6b4ce6';
        let brushSize = 8;
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let canvas, ctx;
        
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

        function initTracing() {
            canvas = document.getElementById('tracingCanvas');
            ctx = canvas.getContext('2d');
            
            // Set canvas size based on container
            const container = canvas.parentElement;
            canvas.width = container.offsetWidth - 20;
            canvas.height = 280;
            
            // Draw guide letter
            drawGuideLetter();
            
            // Generate letter grid
            generateLetterGrid();
            
            // Mouse events
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
            
            // Touch events for mobile
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', stopDrawing);
            
            // Update display
            updateLetterDisplay();
        }

        function generateLetterGrid() {
            const grid = document.getElementById('letterGrid');
            grid.innerHTML = '';
            
            letters.forEach((letter, index) => {
                const btn = document.createElement('button');
                btn.className = 'letter-grid-btn' + (index === traceLetterIndex ? ' active' : '');
                btn.textContent = letter;
                btn.onclick = () => jumpToLetter(index);
                grid.appendChild(btn);
            });
        }

        function jumpToLetter(index) {
            traceLetterIndex = index;
            updateLetterDisplay();
            clearTracing();
            playSound('pop');
        }

        function updateLetterDisplay() {
            const letter = letters[traceLetterIndex];
            document.getElementById('traceLetter').textContent = letter;
            document.getElementById('guideLetter').textContent = letter;
            
            // Update word hint
            const data = alphabetData[letter];
            if (data) {
                document.getElementById('traceWordHint').textContent = `${data.emoji} ${data.word}`;
            }
            
            // Update grid active state
            document.querySelectorAll('.letter-grid-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === traceLetterIndex);
            });
        }

        function drawGuideLetter() {
            const letter = letters[traceLetterIndex];
            
            // Clear canvas with a slight background
            ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw guide letter (faded)
            ctx.font = 'bold 200px Comic Sans MS';
            ctx.fillStyle = 'rgba(200, 200, 200, 0.3)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(letter, canvas.width / 2, canvas.height / 2);
            
            // Draw dotted outline
            ctx.strokeStyle = 'rgba(150, 150, 150, 0.4)';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            ctx.strokeText(letter, canvas.width / 2, canvas.height / 2);
            ctx.setLineDash([]);
        }

        function startDrawing(e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        }

        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            lastX = touch.clientX - rect.left;
            lastY = touch.clientY - rect.top;
            isDrawing = true;
        }

        function draw(e) {
            if (!isDrawing) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            drawLine(lastX, lastY, x, y);
            
            lastX = x;
            lastY = y;
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (!isDrawing) return;
            
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            drawLine(lastX, lastY, x, y);
            
            lastX = x;
            lastY = y;
        }

        function drawLine(x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = drawColor;
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        function stopDrawing() {
            if (isDrawing) {
                isDrawing = false;
                playSound('pop');
            }
        }

        function setDrawColor(color, btn) {
            drawColor = color;
            
            // Update active button
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            playSound('click');
        }

        function setBrushSize(size) {
            brushSize = size;
            
            // Update active button
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            playSound('click');
        }

        function clearTracing() {
            drawGuideLetter();
            playSound('click');
        }

        function speakTraceLetter() {
            const letter = letters[traceLetterIndex];
            const data = alphabetData[letter];
            if (data) {
                speak(`${letter} is for ${data.word}`);
            } else {
                speak(letter);
            }
        }

        function previousTraceLetter() {
            traceLetterIndex = (traceLetterIndex - 1 + letters.length) % letters.length;
            updateLetterDisplay();
            clearTracing();
            playSound('pop');
        }

        function nextTraceLetter() {
            traceLetterIndex = (traceLetterIndex + 1) % letters.length;
            updateLetterDisplay();
            clearTracing();
            playSound('pop');
            
            // Award star occasionally
            if (Math.random() < 0.3) {
                addStar('alphabet');
                celebrate();
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', initTracing);
        
        // Handle resize
        window.addEventListener('resize', () => {
            if (canvas) {
                const container = canvas.parentElement;
                canvas.width = Math.min(container.offsetWidth - 20, 400);
                drawGuideLetter();
            }
        });
    </script>
</body>
</html>
