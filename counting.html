<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔢 Counting - Fun English Learning</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Background shapes -->
    <div class="bg-shapes">
        <div class="floating-shape shape-1">📚</div>
        <div class="floating-shape shape-2">✏️</div>
        <div class="floating-shape shape-3">🎨</div>
        <div class="floating-shape shape-4">🌈</div>
        <div class="floating-shape shape-5">⭐</div>
    </div>
    <div class="bg-shapes" id="dynamicBg"></div>

    <div class="app-container">
        <a href="index.html" class="back-btn">⬅️ Back to Home</a>
        
        <!-- Header -->
        <header class="header">
            <h1 class="app-title">🔢 Count and Learn!</h1>
            <p class="subtitle">How many do you see? 🌟</p>
            
            <div class="score-bar">
                <div class="score-item">
                    <span class="score-icon">⭐</span>
                    <span class="score-text" id="totalStars">0 Stars</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🏆</span>
                    <span class="score-text" id="level">Level 1</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🔥</span>
                    <span class="score-text" id="streak">0 Streak</span>
                </div>
            </div>
        </header>

        <!-- Counting Section -->
        <section class="game-section">
            <h2 class="section-title">🔢 Count the Objects!</h2>
            
            <!-- Difficulty selector -->
            <div class="difficulty-selector">
                <button class="difficulty-btn active" onclick="setCountingDifficulty('easy')" data-difficulty="easy">🌟 Easy (1-5)</button>
                <button class="difficulty-btn" onclick="setCountingDifficulty('medium')" data-difficulty="medium">⭐ Medium (1-10)</button>
                <button class="difficulty-btn" onclick="setCountingDifficulty('hard')" data-difficulty="hard">🔥 Hard (1-20)</button>
            </div>
            
            <div class="counting-game">
                <div class="counting-display" id="countingDisplay">
                    <!-- Items generated by JavaScript -->
                </div>
                
                <div class="counting-question" id="countingQuestion">How many do you see?</div>
                
                <div class="number-choices" id="numberChoices">
                    <!-- Number buttons generated by JavaScript -->
                </div>
                
                <div class="spelling-result" id="countingResult"></div>
                
                <button class="next-round-btn" id="nextCountBtn" onclick="startNewCountRound()" style="display: none;">
                    ▶️ Next Round!
                </button>
            </div>
        </section>
    </div>

    <!-- Celebration container -->
    <div class="celebration" id="celebration"></div>

    <!-- Sound toggle -->
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        // ==================== COUNTING GAME STATE ====================
        let countingDifficulty = 'easy';
        let countingState = {
            correctAnswer: 0,
            item: null
        };

        function setCountingDifficulty(difficulty) {
            countingDifficulty = difficulty;
            
            // Update button states
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.difficulty === difficulty);
            });
            
            startNewCountRound();
            playSound('pop');
        }

        function getMaxCount() {
            switch(countingDifficulty) {
                case 'easy': return 5;
                case 'medium': return 10;
                case 'hard': return 20;
                default: return 5;
            }
        }

        function startNewCountRound() {
            const maxCount = getMaxCount();
            countingState.correctAnswer = Math.floor(Math.random() * maxCount) + 1;
            countingState.item = countingItems[Math.floor(Math.random() * countingItems.length)];
            
            document.getElementById('countingResult').textContent = '';
            document.getElementById('nextCountBtn').style.display = 'none';
            
            // Display items
            const display = document.getElementById('countingDisplay');
            display.innerHTML = '';
            for (let i = 0; i < countingState.correctAnswer; i++) {
                setTimeout(() => {
                    const item = document.createElement('span');
                    item.className = 'counting-item';
                    item.textContent = countingState.item.emoji;
                    item.onclick = () => {
                        item.style.transform = 'scale(1.5)';
                        setTimeout(() => item.style.transform = '', 200);
                        playSound('pop');
                    };
                    display.appendChild(item);
                }, i * 100);
            }
            
            // Update question
            document.getElementById('countingQuestion').textContent = 
                `How many ${countingState.item.name} are there?`;
            
            // Create number choices
            const choices = document.getElementById('numberChoices');
            choices.innerHTML = '';
            
            // Generate options including correct answer
            let options = [countingState.correctAnswer];
            while (options.length < 4) {
                const num = Math.floor(Math.random() * maxCount) + 1;
                if (!options.includes(num)) {
                    options.push(num);
                }
            }
            options.sort(() => Math.random() - 0.5);
            
            setTimeout(() => {
                options.forEach(num => {
                    const btn = document.createElement('button');
                    btn.className = 'number-choice';
                    btn.textContent = num;
                    btn.onclick = () => checkCountAnswer(num, btn);
                    choices.appendChild(btn);
                });
            }, countingState.correctAnswer * 100 + 200);
        }

        function checkCountAnswer(num, btn) {
            document.querySelectorAll('.number-choice').forEach(b => b.disabled = true);
            
            if (num === countingState.correctAnswer) {
                btn.classList.add('correct');
                document.getElementById('countingResult').textContent = `🎉 ${getAgeAppropriateEncouragement()} Great counting! 🌟`;
                playSound('success');
                addStar('counting');
                addStreak();
                celebrate();
                speak(`Yes! There are ${countingState.correctAnswer}!`);
            } else {
                btn.classList.add('wrong');
                document.getElementById('countingResult').textContent = 
                    `❌ Oops! There are ${countingState.correctAnswer}. Try again! 💪`;
                playSound('wrong');
                resetStreak();
            }
            
            document.getElementById('nextCountBtn').style.display = 'block';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', startNewCountRound);
    </script>
</body>
</html>
