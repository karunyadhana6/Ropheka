<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔤 Alphabet - Fun English Learning</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Background shapes -->
    <div class="bg-shapes">
        <div class="floating-shape shape-1">📚</div>
        <div class="floating-shape shape-2">✏️</div>
        <div class="floating-shape shape-3">🎨</div>
        <div class="floating-shape shape-4">🌈</div>
        <div class="floating-shape shape-5">⭐</div>
    </div>
    <div class="bg-shapes" id="dynamicBg"></div>

    <div class="app-container">
        <a href="index.html" class="back-btn">⬅️ Back to Home</a>
        
        <!-- Header -->
        <header class="header">
            <h1 class="app-title">🔤 Learn the Alphabet!</h1>
            <p class="subtitle">Click on letters to learn them! 🌟</p>
            
            <div class="score-bar">
                <div class="score-item">
                    <span class="score-icon">⭐</span>
                    <span class="score-text" id="totalStars">0 Stars</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🏆</span>
                    <span class="score-text" id="level">Level 1</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🔥</span>
                    <span class="score-text" id="streak">0 Streak</span>
                </div>
            </div>
        </header>

        <!-- Alphabet Section -->
        <section class="game-section">
            <div class="letter-display" id="letterDisplay">
                <div class="big-letter" id="bigLetter">A</div>
                <div class="letter-word">A is for <strong>Apple</strong></div>
                <div class="letter-word-emoji">🍎</div>
            </div>
            
            <div class="alphabet-grid" id="alphabetGrid">
                <!-- Letters will be generated by JavaScript -->
            </div>
        </section>
    </div>

    <!-- Celebration container -->
    <div class="celebration" id="celebration"></div>

    <!-- Sound toggle -->
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        // Initialize alphabet grid
        function initAlphabet() {
            const grid = document.getElementById('alphabetGrid');
            grid.innerHTML = '';
            
            for (let letter in alphabetData) {
                const card = document.createElement('div');
                card.className = 'letter-card';
                card.innerHTML = `
                    ${letter}
                    <span class="letter-emoji">${alphabetData[letter].emoji}</span>
                `;
                card.onclick = () => selectLetter(letter, card);
                grid.appendChild(card);
            }
        }

        function selectLetter(letter, cardElement) {
            const data = alphabetData[letter];
            
            // Update display
            document.getElementById('bigLetter').textContent = letter;
            document.querySelector('.letter-word').innerHTML = `${letter} is for <strong>${data.word}</strong>`;
            document.querySelector('.letter-word-emoji').textContent = data.emoji;
            
            // Animate card
            document.querySelectorAll('.letter-card').forEach(card => {
                card.classList.remove('speaking');
            });
            cardElement.classList.add('speaking');
            
            // Speak
            speak(`${letter}. ${letter} is for ${data.word}`);
            playSound('pop');
            
            // Award star
            addStar('alphabet');
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initAlphabet);
    </script>
</body>
</html>
