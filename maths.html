<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>➕ Fun Maths - Fun English Learning</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Background shapes -->
    <div class="bg-shapes">
        <div class="floating-shape shape-1">📚</div>
        <div class="floating-shape shape-2">✏️</div>
        <div class="floating-shape shape-3">🎨</div>
        <div class="floating-shape shape-4">🌈</div>
        <div class="floating-shape shape-5">⭐</div>
    </div>
    <div class="bg-shapes" id="dynamicBg"></div>

    <div class="app-container">
        <a href="index.html" class="back-btn">⬅️ Back to Home</a>
        
        <!-- Header -->
        <header class="header">
            <h1 class="app-title">➕ Fun Maths!</h1>
            <p class="subtitle">Add, subtract and learn! 🌟</p>
            
            <div class="score-bar">
                <div class="score-item">
                    <span class="score-icon">⭐</span>
                    <span class="score-text" id="totalStars">0 Stars</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🏆</span>
                    <span class="score-text" id="level">Level 1</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🔥</span>
                    <span class="score-text" id="streak">0 Streak</span>
                </div>
            </div>
        </header>

        <!-- Maths Section -->
        <section class="game-section">
            <h2 class="section-title">➕ Fun Maths!</h2>
            
            <div class="maths-game">
                <!-- Mode selector -->
                <div class="maths-mode-selector">
                    <button class="maths-mode-btn active" onclick="setMathsMode('addition')" id="additionModeBtn">
                        ➕ Addition
                    </button>
                    <button class="maths-mode-btn" onclick="setMathsMode('subtraction')" id="subtractionModeBtn">
                        ➖ Subtraction
                    </button>
                    <button class="maths-mode-btn" onclick="setMathsMode('compare')" id="compareModeBtn">
                        ⚖️ Compare
                    </button>
                    <button class="maths-mode-btn" onclick="setMathsMode('sequence')" id="sequenceModeBtn">
                        🔢 Sequence
                    </button>
                    <button class="maths-mode-btn" onclick="setMathsMode('shapes')" id="shapesModeBtn">
                        🔷 Shapes
                    </button>
                </div>

                <!-- Difficulty selector -->
                <div class="difficulty-selector">
                    <button class="difficulty-btn active" onclick="setMathsDifficulty('easy')" data-difficulty="easy">🌟 Easy (1-5)</button>
                    <button class="difficulty-btn" onclick="setMathsDifficulty('medium')" data-difficulty="medium">⭐ Medium (1-10)</button>
                    <button class="difficulty-btn" onclick="setMathsDifficulty('hard')" data-difficulty="hard">🔥 Hard (1-20)</button>
                </div>

                <!-- Problem area -->
                <div class="maths-problem-area">
                    <!-- Visual representation -->
                    <div class="maths-visual" id="mathsVisual">
                        <!-- Generated by JavaScript -->
                    </div>

                    <!-- Equation display -->
                    <div class="maths-equation" id="mathsEquation">
                        <!-- Generated by JavaScript -->
                    </div>

                    <!-- Answer choices -->
                    <div class="maths-answer-choices" id="mathsChoices">
                        <!-- Generated by JavaScript -->
                    </div>
                </div>

                <div class="maths-result" id="mathsResult"></div>

                <div class="maths-controls">
                    <button class="maths-btn speak-btn" onclick="speakMathsProblem()">🔊 Read Problem</button>
                    <button class="maths-btn hint-btn" onclick="showMathsHint()">💡 Hint</button>
                    <button class="maths-btn next-btn" onclick="nextMathsProblem()">➡️ Next</button>
                </div>

                <div class="maths-score">
                    <div class="maths-score-item">✅ Correct: <span id="mathsCorrect">0</span></div>
                    <div class="maths-score-item">📝 Problems: <span id="mathsTotal">0</span></div>
                </div>
            </div>
        </section>
    </div>

    <!-- Celebration container -->
    <div class="celebration" id="celebration"></div>

    <!-- Sound toggle -->
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        // ==================== MATHS GAME STATE ====================
        let mathsMode = 'addition';
        let mathsDifficulty = 'easy';
        let mathsState = {
            num1: 0,
            num2: 0,
            operator: '+',
            answer: 0,
            correct: 0,
            total: 0
        };

        function setMathsMode(mode) {
            mathsMode = mode;
            
            // Update button states
            document.querySelectorAll('.maths-mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`${mode}ModeBtn`).classList.add('active');
            
            nextMathsProblem();
            playSound('pop');
        }

        function setMathsDifficulty(difficulty) {
            mathsDifficulty = difficulty;
            
            // Update button states
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.difficulty === difficulty);
            });
            
            nextMathsProblem();
            playSound('pop');
        }

        function getMaxNumber() {
            switch(mathsDifficulty) {
                case 'easy': return 5;
                case 'medium': return 10;
                case 'hard': return 20;
                default: return 5;
            }
        }

        function nextMathsProblem() {
            const max = getMaxNumber();
            const visual = document.getElementById('mathsVisual');
            const equation = document.getElementById('mathsEquation');
            const choices = document.getElementById('mathsChoices');
            
            document.getElementById('mathsResult').textContent = '';
            
            const emoji = mathsEmojis[Math.floor(Math.random() * mathsEmojis.length)];
            
            switch(mathsMode) {
                case 'addition':
                    mathsState.num1 = Math.floor(Math.random() * max) + 1;
                    mathsState.num2 = Math.floor(Math.random() * max) + 1;
                    mathsState.operator = '+';
                    mathsState.answer = mathsState.num1 + mathsState.num2;
                    
                    // Visual
                    visual.innerHTML = `
                        <div class="visual-group">${emoji.repeat(mathsState.num1)}</div>
                        <span class="visual-operator">+</span>
                        <div class="visual-group">${emoji.repeat(mathsState.num2)}</div>
                    `;
                    
                    // Equation
                    equation.innerHTML = `${mathsState.num1} + ${mathsState.num2} = ?`;
                    break;
                    
                case 'subtraction':
                    mathsState.num1 = Math.floor(Math.random() * max) + 2;
                    mathsState.num2 = Math.floor(Math.random() * (mathsState.num1 - 1)) + 1;
                    mathsState.operator = '-';
                    mathsState.answer = mathsState.num1 - mathsState.num2;
                    
                    // Visual
                    visual.innerHTML = `
                        <div class="visual-group">${emoji.repeat(mathsState.num1)}</div>
                        <span class="visual-operator">-</span>
                        <div class="visual-group crossed">${emoji.repeat(mathsState.num2)}</div>
                    `;
                    
                    // Equation
                    equation.innerHTML = `${mathsState.num1} - ${mathsState.num2} = ?`;
                    break;
                    
                case 'compare':
                    mathsState.num1 = Math.floor(Math.random() * max) + 1;
                    mathsState.num2 = Math.floor(Math.random() * max) + 1;
                    mathsState.answer = mathsState.num1 > mathsState.num2 ? '>' : 
                                       mathsState.num1 < mathsState.num2 ? '<' : '=';
                    
                    // Visual
                    visual.innerHTML = `
                        <div class="visual-group">${emoji.repeat(mathsState.num1)}</div>
                        <span class="visual-operator">?</span>
                        <div class="visual-group">${emoji.repeat(mathsState.num2)}</div>
                    `;
                    
                    // Equation
                    equation.innerHTML = `${mathsState.num1} __ ${mathsState.num2}`;
                    
                    // Comparison choices
                    choices.innerHTML = '';
                    ['<', '=', '>'].forEach(op => {
                        const btn = document.createElement('button');
                        btn.className = 'maths-choice';
                        btn.textContent = op;
                        btn.onclick = () => checkMathsAnswer(op, btn);
                        choices.appendChild(btn);
                    });
                    return;
                    
                case 'sequence':
                    const start = Math.floor(Math.random() * (max - 3)) + 1;
                    const missing = Math.floor(Math.random() * 4) + 1;
                    mathsState.answer = start + missing;
                    
                    // Visual
                    let seq = [];
                    for (let i = 0; i < 5; i++) {
                        if (i === missing) {
                            seq.push('<span class="missing-num">?</span>');
                        } else {
                            seq.push(`<span class="seq-num">${start + i}</span>`);
                        }
                    }
                    
                    visual.innerHTML = `<div class="sequence-display">${seq.join(' ')}</div>`;
                    equation.innerHTML = `What number is missing?`;
                    
                    // Sequence choices
                    let seqOptions = [mathsState.answer];
                    while (seqOptions.length < 4) {
                        const opt = Math.floor(Math.random() * max) + 1;
                        if (!seqOptions.includes(opt)) {
                            seqOptions.push(opt);
                        }
                    }
                    seqOptions.sort(() => Math.random() - 0.5);
                    
                    choices.innerHTML = '';
                    seqOptions.forEach(num => {
                        const btn = document.createElement('button');
                        btn.className = 'maths-choice';
                        btn.textContent = num;
                        btn.onclick = () => checkMathsAnswer(num, btn);
                        choices.appendChild(btn);
                    });
                    return;
                    
                case 'shapes':
                    const shape = shapeData[Math.floor(Math.random() * shapeData.length)];
                    mathsState.answer = shape.name;
                    
                    // Visual
                    visual.innerHTML = `<div class="shape-display">${shape.emoji}</div>`;
                    equation.innerHTML = `What shape is this?`;
                    
                    // Shape choices
                    let shapeOptions = [shape];
                    while (shapeOptions.length < 4) {
                        const opt = shapeData[Math.floor(Math.random() * shapeData.length)];
                        if (!shapeOptions.find(s => s.name === opt.name)) {
                            shapeOptions.push(opt);
                        }
                    }
                    shapeOptions.sort(() => Math.random() - 0.5);
                    
                    choices.innerHTML = '';
                    shapeOptions.forEach(s => {
                        const btn = document.createElement('button');
                        btn.className = 'maths-choice shape-choice';
                        btn.innerHTML = `${s.emoji}<br>${s.name}`;
                        btn.onclick = () => checkMathsAnswer(s.name, btn);
                        choices.appendChild(btn);
                    });
                    return;
            }
            
            // Generate number choices for addition/subtraction
            let options = [mathsState.answer];
            while (options.length < 4) {
                const opt = Math.floor(Math.random() * (max * 2)) + 1;
                if (!options.includes(opt)) {
                    options.push(opt);
                }
            }
            options.sort(() => Math.random() - 0.5);
            
            choices.innerHTML = '';
            options.forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'maths-choice';
                btn.textContent = num;
                btn.onclick = () => checkMathsAnswer(num, btn);
                choices.appendChild(btn);
            });
        }

        function checkMathsAnswer(answer, btn) {
            document.querySelectorAll('.maths-choice').forEach(b => b.disabled = true);
            mathsState.total++;
            document.getElementById('mathsTotal').textContent = mathsState.total;
            
            if (answer === mathsState.answer || answer.toString() === mathsState.answer.toString()) {
                btn.classList.add('correct');
                mathsState.correct++;
                document.getElementById('mathsCorrect').textContent = mathsState.correct;
                document.getElementById('mathsResult').textContent = `🎉 ${getAgeAppropriateEncouragement()} Correct! 🌟`;
                playSound('success');
                addStar('maths');
                addStreak();
                celebrate();
            } else {
                btn.classList.add('wrong');
                document.getElementById('mathsResult').textContent = `❌ The answer was ${mathsState.answer}. Keep trying! 💪`;
                playSound('wrong');
                resetStreak();
            }
        }

        function speakMathsProblem() {
            let text = '';
            switch(mathsMode) {
                case 'addition':
                    text = `What is ${mathsState.num1} plus ${mathsState.num2}?`;
                    break;
                case 'subtraction':
                    text = `What is ${mathsState.num1} minus ${mathsState.num2}?`;
                    break;
                case 'compare':
                    text = `Which is bigger, ${mathsState.num1} or ${mathsState.num2}?`;
                    break;
                case 'sequence':
                    text = `What number is missing in the sequence?`;
                    break;
                case 'shapes':
                    text = `What shape do you see?`;
                    break;
            }
            speak(text);
        }

        function showMathsHint() {
            let hint = '';
            switch(mathsMode) {
                case 'addition':
                    hint = `Count ${mathsState.num1} objects, then add ${mathsState.num2} more!`;
                    break;
                case 'subtraction':
                    hint = `Start with ${mathsState.num1}, then take away ${mathsState.num2}!`;
                    break;
                case 'compare':
                    hint = `Count both groups and see which has more!`;
                    break;
                case 'sequence':
                    hint = `Count the numbers in order!`;
                    break;
                case 'shapes':
                    hint = `Look at the shape carefully!`;
                    break;
            }
            speak(hint);
            document.getElementById('mathsResult').textContent = `💡 ${hint}`;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', nextMathsProblem);
    </script>
</body>
</html>
