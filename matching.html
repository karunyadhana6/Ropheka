<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Word Matching - Fun English Learning</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Background shapes -->
    <div class="bg-shapes">
        <div class="floating-shape shape-1">📚</div>
        <div class="floating-shape shape-2">✏️</div>
        <div class="floating-shape shape-3">🎨</div>
        <div class="floating-shape shape-4">🌈</div>
        <div class="floating-shape shape-5">⭐</div>
    </div>
    <div class="bg-shapes" id="dynamicBg"></div>

    <div class="app-container">
        <a href="index.html" class="back-btn">⬅️ Back to Home</a>
        
        <!-- Header -->
        <header class="header">
            <h1 class="app-title">🎯 Match Words!</h1>
            <p class="subtitle">Match the pictures with their words! 🌟</p>
            
            <div class="score-bar">
                <div class="score-item">
                    <span class="score-icon">⭐</span>
                    <span class="score-text" id="totalStars">0 Stars</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🏆</span>
                    <span class="score-text" id="level">Level 1</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🔥</span>
                    <span class="score-text" id="streak">0 Streak</span>
                </div>
            </div>
        </header>

        <!-- Matching Section -->
        <section class="game-section">
            <h2 class="section-title">🎯 Match the Pictures with Words!</h2>
            
            <!-- Difficulty selector -->
            <div class="difficulty-selector">
                <button class="difficulty-btn active" onclick="setMatchingDifficulty('easy')" data-difficulty="easy">🌟 Easy</button>
                <button class="difficulty-btn" onclick="setMatchingDifficulty('medium')" data-difficulty="medium">⭐ Medium</button>
                <button class="difficulty-btn" onclick="setMatchingDifficulty('hard')" data-difficulty="hard">🔥 Hard</button>
                <button class="difficulty-btn" onclick="setMatchingDifficulty('advanced')" data-difficulty="advanced">🏆 Advanced</button>
            </div>
            
            <div class="match-container" id="matchContainer">
                <div class="match-column">
                    <h3>📷 Pictures</h3>
                    <div id="pictureColumn"></div>
                </div>
                <div class="match-column">
                    <h3>📝 Words</h3>
                    <div id="wordColumn"></div>
                </div>
            </div>
            
            <div class="match-feedback" id="matchFeedback"></div>
            <button class="next-round-btn" id="nextMatchBtn" onclick="startNewMatchRound()" style="display: none;">
                ▶️ Next Round!
            </button>
        </section>
    </div>

    <!-- Celebration container -->
    <div class="celebration" id="celebration"></div>

    <!-- Sound toggle -->
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        let matchingDifficulty = 'easy';
        let selectedPicture = null;
        let selectedWord = null;
        let matchedPairs = 0;
        let currentGameWords = [];

        function getMatchingWordsByDifficulty() {
            switch(matchingDifficulty) {
                case 'easy': return matchingWordsEasy;
                case 'medium': return matchingWordsMedium;
                case 'hard': return matchingWordsHard;
                case 'advanced': return matchingWordsAdvanced;
                default: return matchingWordsEasy;
            }
        }

        function setMatchingDifficulty(difficulty) {
            matchingDifficulty = difficulty;
            
            // Update buttons
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-difficulty="${difficulty}"]`).classList.add('active');
            
            startNewMatchRound();
            playSound('pop');
        }

        function startNewMatchRound() {
            matchedPairs = 0;
            selectedPicture = null;
            selectedWord = null;
            
            document.getElementById('matchFeedback').textContent = '';
            document.getElementById('nextMatchBtn').style.display = 'none';
            
            const allWords = getMatchingWordsByDifficulty();
            const shuffled = [...allWords].sort(() => Math.random() - 0.5);
            currentGameWords = shuffled.slice(0, 4);
            
            const pictureColumn = document.getElementById('pictureColumn');
            const wordColumn = document.getElementById('wordColumn');
            
            const pictureOrder = [...currentGameWords].sort(() => Math.random() - 0.5);
            const wordOrder = [...currentGameWords].sort(() => Math.random() - 0.5);
            
            pictureColumn.innerHTML = pictureOrder.map(item => `
                <div class="match-item picture" data-word="${item.word}" onclick="selectPicture(this)">
                    ${item.emoji}
                </div>
            `).join('');
            
            wordColumn.innerHTML = wordOrder.map(item => `
                <div class="match-item word" data-word="${item.word}" onclick="selectWord(this)">
                    ${item.word}
                </div>
            `).join('');
        }

        function selectPicture(element) {
            if (element.classList.contains('correct')) return;
            
            document.querySelectorAll('.match-item.picture').forEach(item => {
                item.classList.remove('selected');
            });
            
            element.classList.add('selected');
            selectedPicture = element;
            playSound('click');
            
            checkMatch();
        }

        function selectWord(element) {
            if (element.classList.contains('correct')) return;
            
            document.querySelectorAll('.match-item.word').forEach(item => {
                item.classList.remove('selected');
            });
            
            element.classList.add('selected');
            selectedWord = element;
            playSound('click');
            
            checkMatch();
        }

        function checkMatch() {
            if (!selectedPicture || !selectedWord) return;
            
            const pictureWord = selectedPicture.dataset.word;
            const wordText = selectedWord.dataset.word;
            
            if (pictureWord === wordText) {
                // Correct match
                selectedPicture.classList.remove('selected');
                selectedWord.classList.remove('selected');
                selectedPicture.classList.add('correct');
                selectedWord.classList.add('correct');
                
                matchedPairs++;
                document.getElementById('matchFeedback').textContent = `✨ ${getAgeAppropriateEncouragement()} ✨`;
                
                playSound('success');
                celebrate();
                addStar('matching');
                addStreak();
                
                speak(wordText);
                
                if (matchedPairs === 4) {
                    document.getElementById('matchFeedback').textContent = '🎉 All matched! Great job! 🎉';
                    document.getElementById('nextMatchBtn').style.display = 'block';
                }
            } else {
                // Wrong match
                selectedPicture.classList.add('wrong');
                selectedWord.classList.add('wrong');
                
                document.getElementById('matchFeedback').textContent = '❌ Try again!';
                playSound('wrong');
                resetStreak();
                
                setTimeout(() => {
                    selectedPicture.classList.remove('wrong', 'selected');
                    selectedWord.classList.remove('wrong', 'selected');
                    document.getElementById('matchFeedback').textContent = '';
                }, 800);
            }
            
            selectedPicture = null;
            selectedWord = null;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', startNewMatchRound);
    </script>
</body>
</html>
