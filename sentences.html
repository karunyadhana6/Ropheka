<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 Learn Sentences - Fun English Learning</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Background shapes -->
    <div class="bg-shapes">
        <div class="floating-shape shape-1">📚</div>
        <div class="floating-shape shape-2">✏️</div>
        <div class="floating-shape shape-3">🎨</div>
        <div class="floating-shape shape-4">🌈</div>
        <div class="floating-shape shape-5">⭐</div>
    </div>
    <div class="bg-shapes" id="dynamicBg"></div>

    <div class="app-container">
        <a href="index.html" class="back-btn">⬅️ Back to Home</a>
        
        <!-- Header -->
        <header class="header">
            <h1 class="app-title">💬 Learn Sentences!</h1>
            <p class="subtitle">Read, build and complete sentences! 🌟</p>
            
            <div class="score-bar">
                <div class="score-item">
                    <span class="score-icon">⭐</span>
                    <span class="score-text" id="totalStars">0 Stars</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🏆</span>
                    <span class="score-text" id="level">Level 1</span>
                </div>
                <div class="score-item">
                    <span class="score-icon">🔥</span>
                    <span class="score-text" id="streak">0 Streak</span>
                </div>
            </div>
        </header>

        <!-- Sentences Section -->
        <section class="game-section">
            <h2 class="section-title">💬 Learn Sentences!</h2>
            
            <div class="sentence-game">
                <!-- Mode selector -->
                <div class="sentence-mode-selector">
                    <button class="sentence-mode-btn active" onclick="setSentenceMode('reading')" id="readingModeBtn">
                        📖 Read Sentences
                    </button>
                    <button class="sentence-mode-btn" onclick="setSentenceMode('builder')" id="builderModeBtn">
                        🧩 Build Sentences
                    </button>
                    <button class="sentence-mode-btn" onclick="setSentenceMode('fillblank')" id="fillblankModeBtn">
                        ✏️ Fill in the Blank
                    </button>
                </div>

                <!-- Category tabs -->
                <div class="sentence-category-tabs">
                    <button class="category-tab active" onclick="setSentenceCategory('animals')" data-category="animals">🐾 Animals</button>
                    <button class="category-tab" onclick="setSentenceCategory('family')" data-category="family">👨‍👩‍👧 Family</button>
                    <button class="category-tab" onclick="setSentenceCategory('food')" data-category="food">🍎 Food</button>
                    <button class="category-tab" onclick="setSentenceCategory('nature')" data-category="nature">🌳 Nature</button>
                    <button class="category-tab" onclick="setSentenceCategory('actions')" data-category="actions">🏃 Actions</button>
                    <button class="category-tab" onclick="setSentenceCategory('colors')" data-category="colors">🎨 Colors</button>
                </div>

                <!-- Sentence display area -->
                <div class="sentence-display-area">
                    <div class="sentence-category-label" id="sentenceCategoryLabel">🐾 Animals</div>
                    <div class="sentence-illustration" id="sentenceIllustration">🐱</div>
                    
                    <!-- Reading Mode Content -->
                    <div class="reading-area" id="readingArea">
                        <div class="reading-sentence" id="readingSentence">
                            <!-- Words will be generated by JavaScript -->
                        </div>
                    </div>

                    <!-- Builder Mode Content -->
                    <div class="builder-area" id="builderArea" style="display: none;">
                        <div class="sentence-target">
                            <div class="target-label">Build this sentence:</div>
                            <div class="target-sentence" id="targetSentence">The cat is fluffy.</div>
                        </div>
                        
                        <div class="sentence-slots" id="sentenceSlots">
                            <!-- Slots generated by JavaScript -->
                        </div>
                        
                        <div class="word-bank" id="wordBank">
                            <!-- Word choices generated by JavaScript -->
                        </div>
                    </div>

                    <!-- Fill in the Blank Mode Content -->
                    <div class="fillblank-area" id="fillblankArea" style="display: none;">
                        <div class="blank-sentence" id="blankSentence">
                            <!-- Sentence with blank generated by JavaScript -->
                        </div>
                        
                        <div class="answer-choices" id="answerChoices">
                            <!-- Answer choices generated by JavaScript -->
                        </div>
                    </div>
                </div>

                <div class="sentence-result" id="sentenceResult"></div>

                <div class="sentence-controls">
                    <button class="sentence-btn read-btn" onclick="readCurrentSentence()">🔊 Read Aloud</button>
                    <button class="sentence-btn hint-btn" onclick="showSentenceHint()" id="hintBtn">💡 Hint</button>
                    <button class="sentence-btn clear-btn" onclick="clearSentenceBuilder()" id="clearSentenceBtn" style="display: none;">🔄 Clear</button>
                    <button class="sentence-btn next-btn" onclick="nextSentence()">➡️ Next</button>
                </div>

                <div class="sentence-progress">
                    <span id="sentenceProgressText">Sentence 1 of 5</span>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="sentenceProgressBar" style="width: 20%;"></div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Celebration container -->
    <div class="celebration" id="celebration"></div>

    <!-- Sound toggle -->
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        // ==================== SENTENCE GAME STATE ====================
        let sentenceMode = 'reading';
        let sentenceCategory = 'animals';
        let sentenceIndex = 0;
        let currentSentence = null;
        let builderState = {
            slots: [],
            words: []
        };

        const categoryLabels = {
            animals: '🐾 Animals',
            family: '👨‍👩‍👧 Family',
            food: '🍎 Food',
            nature: '🌳 Nature',
            actions: '🏃 Actions',
            colors: '🎨 Colors'
        };

        function setSentenceMode(mode) {
            sentenceMode = mode;
            
            // Update button states
            document.querySelectorAll('.sentence-mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`${mode}ModeBtn`).classList.add('active');
            
            // Show/hide areas
            document.getElementById('readingArea').style.display = mode === 'reading' ? 'block' : 'none';
            document.getElementById('builderArea').style.display = mode === 'builder' ? 'block' : 'none';
            document.getElementById('fillblankArea').style.display = mode === 'fillblank' ? 'block' : 'none';
            
            // Show/hide clear button
            document.getElementById('clearSentenceBtn').style.display = mode === 'builder' ? 'inline-block' : 'none';
            
            loadSentence();
            playSound('pop');
        }

        function setSentenceCategory(category) {
            sentenceCategory = category;
            sentenceIndex = 0;
            
            // Update button states
            document.querySelectorAll('.category-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });
            
            document.getElementById('sentenceCategoryLabel').textContent = categoryLabels[category];
            
            loadSentence();
            playSound('pop');
        }

        function loadSentence() {
            const sentences = sentenceData[sentenceCategory];
            currentSentence = sentences[sentenceIndex];
            
            document.getElementById('sentenceIllustration').textContent = currentSentence.illustration;
            document.getElementById('sentenceResult').textContent = '';
            
            // Update progress
            document.getElementById('sentenceProgressText').textContent = `Sentence ${sentenceIndex + 1} of ${sentences.length}`;
            document.getElementById('sentenceProgressBar').style.width = ((sentenceIndex + 1) / sentences.length * 100) + '%';
            
            switch(sentenceMode) {
                case 'reading':
                    loadReadingMode();
                    break;
                case 'builder':
                    loadBuilderMode();
                    break;
                case 'fillblank':
                    loadFillBlankMode();
                    break;
            }
        }

        function loadReadingMode() {
            const words = currentSentence.sentence.split(' ');
            const container = document.getElementById('readingSentence');
            
            container.innerHTML = words.map(word => 
                `<span class="reading-word" onclick="speakWord('${word.replace(/[.,!?]/g, '')}')">${word}</span>`
            ).join(' ');
        }

        function loadBuilderMode() {
            builderState.slots = [];
            builderState.words = [];
            
            document.getElementById('targetSentence').textContent = currentSentence.sentence;
            
            const words = currentSentence.sentence.split(' ');
            const slotsContainer = document.getElementById('sentenceSlots');
            slotsContainer.innerHTML = '';
            
            words.forEach((word, i) => {
                const slot = document.createElement('div');
                slot.className = 'word-slot';
                slot.id = `wordSlot-${i}`;
                slot.dataset.word = word;
                slotsContainer.appendChild(slot);
            });
            
            // Create shuffled word bank
            const shuffledWords = [...words].sort(() => Math.random() - 0.5);
            const wordBank = document.getElementById('wordBank');
            wordBank.innerHTML = '';
            
            shuffledWords.forEach((word, i) => {
                const wordBtn = document.createElement('button');
                wordBtn.className = 'word-bank-item';
                wordBtn.textContent = word;
                wordBtn.id = `wordBank-${i}`;
                wordBtn.onclick = () => selectBuilderWord(word, wordBtn);
                wordBank.appendChild(wordBtn);
            });
        }

        function selectBuilderWord(word, btn) {
            // Find first empty slot
            const slots = document.querySelectorAll('.word-slot');
            let targetSlot = null;
            
            for (let slot of slots) {
                if (!slot.textContent) {
                    targetSlot = slot;
                    break;
                }
            }
            
            if (!targetSlot) return;
            
            targetSlot.textContent = word;
            targetSlot.classList.add('filled');
            btn.disabled = true;
            builderState.words.push({ word, btnId: btn.id, slotId: targetSlot.id });
            
            playSound('pop');
            
            // Check if all slots are filled
            const allFilled = Array.from(slots).every(slot => slot.textContent);
            if (allFilled) {
                checkBuilderAnswer();
            }
        }

        function checkBuilderAnswer() {
            const slots = document.querySelectorAll('.word-slot');
            const builtSentence = Array.from(slots).map(s => s.textContent).join(' ');
            
            if (builtSentence === currentSentence.sentence) {
                document.getElementById('sentenceResult').textContent = `🎉 ${getAgeAppropriateEncouragement()} Correct! 🌟`;
                playSound('success');
                addStar('sentences');
                addStreak();
                celebrate();
                speak(currentSentence.sentence);
            } else {
                document.getElementById('sentenceResult').textContent = '❌ Not quite right. Try again! 💪';
                playSound('wrong');
                resetStreak();
            }
        }

        function clearSentenceBuilder() {
            builderState.words.forEach(item => {
                const btn = document.getElementById(item.btnId);
                if (btn) btn.disabled = false;
                
                const slot = document.getElementById(item.slotId);
                if (slot) {
                    slot.textContent = '';
                    slot.classList.remove('filled');
                }
            });
            
            builderState.words = [];
            document.getElementById('sentenceResult').textContent = '';
            playSound('click');
        }

        function loadFillBlankMode() {
            const words = currentSentence.sentence.split(' ');
            const blankWord = currentSentence.blank;
            
            const displayWords = words.map(word => {
                const cleanWord = word.replace(/[.,!?]/g, '');
                if (cleanWord.toLowerCase() === blankWord.toLowerCase()) {
                    return '<span class="blank-space">_____</span>' + word.replace(cleanWord, '');
                }
                return word;
            });
            
            document.getElementById('blankSentence').innerHTML = displayWords.join(' ');
            
            // Generate choices
            const choices = document.getElementById('answerChoices');
            choices.innerHTML = '';
            
            let options = [blankWord];
            const allBlanks = Object.values(sentenceData).flat().map(s => s.blank);
            while (options.length < 4) {
                const opt = allBlanks[Math.floor(Math.random() * allBlanks.length)];
                if (!options.includes(opt)) {
                    options.push(opt);
                }
            }
            options.sort(() => Math.random() - 0.5);
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'answer-choice-btn';
                btn.textContent = opt;
                btn.onclick = () => checkFillBlankAnswer(opt, btn);
                choices.appendChild(btn);
            });
        }

        function checkFillBlankAnswer(answer, btn) {
            document.querySelectorAll('.answer-choice-btn').forEach(b => b.disabled = true);
            
            if (answer.toLowerCase() === currentSentence.blank.toLowerCase()) {
                btn.classList.add('correct');
                document.getElementById('sentenceResult').textContent = `🎉 ${getAgeAppropriateEncouragement()} Correct! 🌟`;
                
                // Fill in the blank
                document.querySelector('.blank-space').textContent = answer;
                document.querySelector('.blank-space').classList.add('filled');
                
                playSound('success');
                addStar('sentences');
                addStreak();
                celebrate();
                speak(currentSentence.sentence);
            } else {
                btn.classList.add('wrong');
                document.getElementById('sentenceResult').textContent = `❌ The answer was "${currentSentence.blank}". Try again! 💪`;
                playSound('wrong');
                resetStreak();
            }
        }

        function readCurrentSentence() {
            speak(currentSentence.sentence);
        }

        function showSentenceHint() {
            const hint = `The missing word starts with "${currentSentence.blank[0]}"`;
            speak(hint);
            document.getElementById('sentenceResult').textContent = `💡 ${hint}`;
        }

        function nextSentence() {
            const sentences = sentenceData[sentenceCategory];
            sentenceIndex = (sentenceIndex + 1) % sentences.length;
            loadSentence();
            playSound('pop');
        }

        function speakWord(word) {
            speak(word);
            playSound('click');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadSentence);
    </script>
</body>
</html>
